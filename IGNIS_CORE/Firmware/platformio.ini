;  PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F411CE]
platform = ststm32
board = blackpill_f411ce
framework = arduino

; Specify the DFU protocol - PlatformIO will use dfu-util for this board
upload_protocol = dfu

; Crucially, tell PlatformIO NOT to look for a Maple bootloader serial port
board_upload.use_1200bps_touch = no
board_upload.wait_for_upload_port = no

; Optional: Explicitly set the upload port to null to avoid auto-detection conflicts
;upload_port = 0

; Optional: If dfu-util can't find the device, try specifying its USB IDs
; board_upload.dfu_util_additional_flags = -d 0483:df11


; Enable USB CDC Serial
build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D HAL_PCD_MODULE_ENABLED

; Optional: Customize USB descriptors
    -D USBD_VID=0x0483
    -D USBD_PID=0x5740
    -D USB_MANUFACTURER="\"STM32\""
    -D USB_PRODUCT="\"BlackPill F411CE\""